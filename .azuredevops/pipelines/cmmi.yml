name: cmmi-governance-$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: simulatedEnvironment
    displayName: Ambiente simulado
    type: string
    default: homologacao
    values:
      - desenvolvimento
      - homologacao
      - producao-demo
  - name: releaseNote
    displayName: Nota da entrega
    type: string
    default: Entrega simulada do Sistema Governamental

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/cmmi-governance/**
      - scripts/**
      - tests/**
      - package.json
      - .azuredevops/pipelines/cmmi.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - apps/cmmi-governance/**
      - scripts/**
      - tests/**
      - package.json

pool:
  vmImage: ubuntu-latest

variables:
  appPath: apps/cmmi-governance
  artifactName: cmmi-governance-site

steps:
  - task: NodeTool@0
    displayName: Usar Node.js 20
    inputs:
      versionSpec: 20.x

  - script: npm test
    displayName: Executar testes automatizados

  - script: node scripts/validate-project.mjs $(appPath)
    displayName: Validar Sistema Governamental

  - script: node scripts/build.mjs $(appPath)
    displayName: Gerar site estatico

  - task: PublishPipelineArtifact@1
    displayName: Publicar artefato
    inputs:
      targetPath: dist/cmmi-governance
      artifact: $(artifactName)

  - script: |
      echo "Simulando deploy do Sistema Governamental..."
      echo "Origem: monorepo publico no GitHub"
      echo "Artefato: $(artifactName)"
      echo "Ambiente: ${{ parameters.simulatedEnvironment }}"
      echo "Nota: ${{ parameters.releaseNote }}"
      echo "Nenhum recurso Azure foi criado."
    displayName: Simular deploy
